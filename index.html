<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Counter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800;900&family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=Roboto:wght@300;400;500;700;900&family=Raleway:wght@300;400;500;600;700;800;900&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--page-bg); color: var(--text-main);
    font-family: 'Inter', sans-serif;
    overflow: hidden; user-select: none;
    --title-font: 'Oswald', sans-serif;
    --digit-font: 'Oswald', sans-serif;
    --title-size: 58px;
    --digit-scale: 1;
    --title-color: var(--title-color);
    --digit-color: #ffffff;
    --comma-color: var(--comma-color);
    --live-scale: 1;
    --page-bg: #080808;
    --panel-bg: #151515;
    --field-bg: rgba(255,255,255,0.05);
    --field-border: rgba(255,255,255,0.1);
    --text-main: #ffffff;
    --text-muted: rgba(255,255,255,0.45);
    --grid-opacity: 1;
    --bg-image: none;
    --title-font: 'Oswald', sans-serif;
    --digit-font: 'Oswald', sans-serif;
    --title-size: clamp(28px, 5.5vw, 58px);
    --digit-size-mult: 1;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.014) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px),
      var(--bg-image);
    background-size: 64px 64px, 64px 64px, cover;
    background-position: center, center, center;
    background-repeat: repeat, repeat, no-repeat;
    opacity: var(--grid-opacity);
    pointer-events: none; z-index: 0;
  }
  body.has-bg::before {
    background-image: var(--bg-image);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 1;
  }
  body.has-bg::after {
    background: rgba(0,0,0,0.35);
    width: 100%; height: 100%; top: 50%;
  }
  body.light-mode {
    --page-bg: #f7f7f7;
    --panel-bg: #ffffff;
    --field-bg: rgba(0,0,0,0.04);
    --field-border: rgba(0,0,0,0.12);
    --text-main: #111111;
    --text-muted: rgba(0,0,0,0.55);
    --title-color: #111111;
    --digit-color: #111111;
    --comma-color: rgba(0,0,0,0.28);
    --grid-opacity: 0.6;
  }
  body::after {
    content: ''; position: fixed; top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(255,50,50,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1;
  }

  .live-badge {
    display: flex; align-items: center; gap: 7px;
    background: #e03030; color: #fff;
    font-size: 11px; font-weight: 500;
    letter-spacing: 2.5px; text-transform: uppercase;
    padding: 5px 13px; border-radius: 4px; margin-bottom: 22px;
    transform: scale(var(--live-scale));
    transform-origin: center;
    animation: pulseBadge 2.2s ease-in-out infinite;
    transition: opacity 0.3s, transform 0.3s;
  }
  .live-badge.hidden { opacity: 0; pointer-events: none; transform: scale(calc(var(--live-scale) * 0.85)); }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #fff; animation: blink 1.3s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
  @keyframes pulseBadge { 0%,100%{box-shadow:0 0 12px rgba(220,50,50,0.3)} 50%{box-shadow:0 0 28px rgba(220,50,50,0.55)} }

  .title-wrap { margin-bottom: 36px; }
  #titleDisplay {
    font-family: var(--title-font);
    font-size: var(--title-size);
    letter-spacing: 1px; font-weight: 600;
    text-transform: none;
    color: var(--title-color);
    line-height: 1; text-align: center;
  }

  .counter-wrap { display: flex; align-items: center; }

  .digit-col {
    overflow: hidden;
    position: relative;
  }


  .digit-strip {
    display: flex;
    flex-direction: column;
    align-items: center;
    will-change: transform;
  }
  .digit-strip span {
    display: block;
    font-family: var(--digit-font);
    font-weight: 600;
    color: var(--digit-color);
    text-align: center;
    line-height: 1;
    flex-shrink: 0;
  }

  .comma {
    font-family: var(--digit-font);
    font-weight: 600;
    color: var(--comma-color);
    line-height: 1;
    align-self: center;
    margin: 0 2px;
    padding-bottom: 4px;
  }

  .gear-btn {
    position: fixed; bottom: 24px; right: 24px;
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--field-bg);
    border: 0.5px solid var(--field-border);
    color: rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 100;
    transition: background 0.2s, color 0.2s, transform 0.35s;
  }
  .gear-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .gear-btn.open { transform: rotate(60deg); color: #e03030; }
  .gear-btn svg { width: 19px; height: 19px; }

  .panel {
    position: fixed; bottom: 76px; right: 24px; width: 300px;
    background: var(--panel-bg); border: 0.5px solid rgba(255,255,255,0.09);
    border-radius: 14px; padding: 18px; z-index: 99;
    opacity: 0; pointer-events: none;
    transform: scale(0.9) translateY(10px); transform-origin: bottom right;
    transition: opacity 0.2s, transform 0.2s;
  }
  .panel.open { opacity: 1; pointer-events: all; transform: scale(1) translateY(0); }
  .panel-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 14px; font-weight: 500; }
  .field { margin-bottom: 12px; }
  .field label { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
  .field label b { color: var(--text-main); font-weight: 500; }
  input[type=text], input[type=number] {
    width: 100%; padding: 7px 10px;
    background: var(--field-bg);
    border: 0.5px solid var(--field-border);
    border-radius: 8px; color: #fff; font-size: 14px;
    outline: none; font-family: 'Inter', sans-serif;
  }
  
  input[type=text]:focus, input[type=number]:focus { border-color: #e03030; }

  .font-select {
    width: 100%; padding: 7px 10px;
    background: var(--field-bg);
    border: 0.5px solid var(--field-border);
    border-radius: 8px; color: #fff; font-size: 14px;
    outline: none; font-family: 'Inter', sans-serif;
  }

  .font-select option {
    background: var(--panel-bg);
    color: #fff;
  }

  input[type=range] {
    width: 100%; -webkit-appearance: none; appearance: none;
    height: 3px; border-radius: 2px;
    background: rgba(255,255,255,0.1); outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: #e03030; cursor: pointer;
  }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .toggle-row span { font-size: 12px; color: var(--text-muted); }
  .toggle { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; inset: 0; background: rgba(255,255,255,0.1); border-radius: 22px; cursor: pointer; transition: background 0.2s; border: 0.5px solid rgba(255,255,255,0.12); }
  .toggle input:checked + .toggle-track { background: #e03030; }
  .toggle-track::after { content: ''; position: absolute; top: 3px; left: 3px; width: 15px; height: 15px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
  .toggle input:checked + .toggle-track::after { transform: translateX(16px); }
  hr { border: none; border-top: 0.5px solid rgba(255,255,255,0.07); margin: 12px 0; }
  .btn-row { display: flex; gap: 8px; }
  .apply {
    flex: 1; padding: 9px; background: #e03030; border: none; border-radius: 8px;
    color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; letter-spacing: 0.3px;
    transition: opacity 0.15s;
  }
  .apply:hover { opacity: 0.85; }
  .reset-btn {
    flex: 1; padding: 9px;
    background: rgba(255,255,255,0.07);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: rgba(255,255,255,0.75);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: background 0.15s;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.12); }

  input[type=color] {
    width: 100%; height: 34px;
    background: var(--field-bg);
    border: 0.5px solid var(--field-border);
    border-radius: 8px; padding: 4px;
    cursor: pointer;
  }
  input[type=file] {
    width: 100%;
    color: var(--text-muted);
    font-size: 12px;
  }
  .small-btn {
    width: 100%; padding: 9px;
    background: rgba(255,255,255,0.07);
    border: 0.5px solid var(--field-border);
    border-radius: 8px; color: var(--text-main);
    font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .small-btn:hover { opacity: 0.85; }
  body.light-mode .gear-btn { color: rgba(0,0,0,0.45); background: rgba(0,0,0,0.05); }
  body.light-mode .reset-btn, body.light-mode .small-btn { background: rgba(0,0,0,0.06); }

</style>
</head>
<body>

<div class="stage">
  <div class="live-badge" id="liveBadge"><div class="live-dot"></div>Live</div>
  <div class="title-wrap"><div id="titleDisplay">Title Here</div></div>
  <div class="counter-wrap" id="counterWrap"></div>
</div>

<button class="gear-btn" id="gearBtn" aria-label="Settings">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>

  <div class="field">

<script>
/* ══════════════════════════════════════════════════
   SMOOTH ODOMETER ENGINE (from 2nd file, adapted for 1st file UI)

   - targetValue  = real count; jumps on every tick
   - displayValue = shown count; smoothly chases targetValue with RAF
   - Each digit column has a long 0-9 repeated strip
   - Digits roll forward like a real odometer
   ══════════════════════════════════════════════════ */

const REPEATS  = 20;
const MID_WRAP = 10;
const EASE     = 0.04;

let cfg = { start: 0, speed: 1000, min: 1, max: 5 };
let targetValue  = 0;
let displayValue = 0;
let ticker       = null;
let rafId        = null;
let cols         = [];

const wrap = document.getElementById('counterWrap');

function fontSize() {
  const sizeControl = document.getElementById('digitSizeI');
  const mult = sizeControl ? (parseFloat(sizeControl.value) || 1) : 1;
  const base = Math.min(Math.max(window.innerWidth * 0.155, 82), 168);
  return base * mult;
}
function digitW(fs) { return fs * 0.60; }

function currentChars() {
  return Math.round(Math.max(0, displayValue)).toLocaleString('en-US').split('');
}

/* Build/rebuild digit strips */
function buildCols() {
  wrap.innerHTML = '';
  cols = [];

  const fs = fontSize();
  const dw = digitW(fs);
  const chars = currentChars();

  chars.forEach(ch => {
    if (ch === ',') {
      const comma = document.createElement('div');
      comma.className = 'comma';
      comma.style.fontSize = (fs * 0.55) + 'px';
      comma.textContent = ',';
      wrap.appendChild(comma);
      return;
    }

    const col = document.createElement('div');
    col.className = 'digit-col';
    col.style.width  = dw + 'px';
    col.style.height = fs + 'px';

    const strip = document.createElement('div');
    strip.className = 'digit-strip';
    strip.style.width = dw + 'px';

    for (let r = 0; r < REPEATS; r++) {
      for (let d = 0; d <= 9; d++) {
        const s = document.createElement('span');
        s.textContent = String(d);
        s.style.width    = dw + 'px';
        s.style.height   = fs + 'px';
        s.style.fontSize = fs + 'px';
        strip.appendChild(s);
      }
    }

    col.appendChild(strip);
    wrap.appendChild(col);

    const digit = parseInt(ch, 10) || 0;
    const absIndex = MID_WRAP * 10 + digit;

    cols.push({ el: col, strip, fs, absIndex });
    strip.style.transition = 'none';
    strip.style.transform = `translateY(-${absIndex * fs}px)`;
  });
}

/* Move shown value smoothly towards target value */
function rafLoop() {
  const diff = targetValue - displayValue;

  if (Math.abs(diff) < 0.01) {
    displayValue = targetValue;
    applyDigits(true);
    rafId = null;
    return;
  }

  displayValue += diff * EASE;
  applyDigits(false);
  rafId = requestAnimationFrame(rafLoop);
}

function startRAF() {
  if (!rafId) rafId = requestAnimationFrame(rafLoop);
}

/* Apply displayValue to odometer columns */
function applyDigits(isFinal) {
  const chars = Math.round(Math.max(0, displayValue)).toLocaleString('en-US').split('');
  const digitChars = chars.filter(c => c !== ',');

  if (cols.length !== digitChars.length) {
    buildCols();
    return;
  }

  digitChars.forEach((ch, i) => {
    const target = parseInt(ch, 10) || 0;
    const col = cols[i];
    const curVisibleDigit = ((Math.round(col.absIndex) % 10) + 10) % 10;

    let steps = (target - curVisibleDigit + 10) % 10;

    if (steps !== 0 || isFinal) {
      col.absIndex += steps;

      if (col.absIndex > (REPEATS - 3) * 10) {
        col.absIndex -= MID_WRAP * 10;
        col.strip.style.transition = 'none';
        col.strip.style.transform = `translateY(-${col.absIndex * col.fs}px)`;
        col.strip.getBoundingClientRect();
      }

      col.strip.style.transition = `transform 0.55s cubic-bezier(0.25, 1, 0.5, 1)`;
      col.strip.style.transform = `translateY(-${col.absIndex * col.fs}px)`;
    }
  });
}

/* Live ticker */
function startCounter() {
  if (ticker) clearInterval(ticker);

  ticker = setInterval(() => {
    const inc = Math.floor(Math.random() * (cfg.max - cfg.min + 1)) + cfg.min;
    targetValue += inc;
    startRAF();
  }, cfg.speed);
}

function initCounter() {
  if (ticker) clearInterval(ticker);
  if (rafId) cancelAnimationFrame(rafId);

  displayValue = Math.max(0, cfg.start);
  targetValue  = Math.max(0, cfg.start);
  rafId = null;

  buildCols();
  startCounter();
}

/* Boot */
buildCols();

/* ── Panel / Settings from 1st file ── */
const gearBtn    = document.getElementById('gearBtn');
const panelEl    = document.getElementById('panel');
const liveBadge  = document.getElementById('liveBadge');
const titleDisp  = document.getElementById('titleDisplay');
const liveToggle = document.getElementById('liveToggle');
let pOpen = false;

gearBtn.addEventListener('click', () => {
  pOpen = !pOpen;
  panelEl.classList.toggle('open', pOpen);
  gearBtn.classList.toggle('open', pOpen);
});

document.addEventListener('click', e => {
  if (pOpen && !panelEl.contains(e.target) && !gearBtn.contains(e.target)) {
    pOpen = false;
    panelEl.classList.remove('open');
    gearBtn.classList.remove('open');
  }
});

liveToggle.addEventListener('change', () => {
  liveBadge.classList.toggle('hidden', !liveToggle.checked);
});


const titleFontI = document.getElementById('titleFontI');

const liveSizeI = document.getElementById('liveSizeI');
const titleColorI = document.getElementById('titleColorI');
const digitColorI = document.getElementById('digitColorI');
const bgImageI = document.getElementById('bgImageI');
const modeToggle = document.getElementById('modeToggle');
const clearBgBtn = document.getElementById('clearBgBtn');
const STORAGE_KEY = 'rr_live_counter_settings_v2';

function setVar(name, value) {
  document.body.style.setProperty(name, value);
}

function currentSettings() {
  return {
    title: document.getElementById('titleI').value,
    titleFont: titleFontI.value,
    digitFont: digitFontI.value,
    titleSize: titleSizeI.value,
    digitSize: digitSizeI.value,
    liveSize: liveSizeI.value,
    titleColor: titleColorI.value,
    digitColor: digitColorI.value,
    lightMode: modeToggle.checked,
    bgImage: localStorage.getItem(STORAGE_KEY + '_bg') || ''
  };
}

function saveSettings() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(currentSettings()));
}

function applyVisualSettings(save = true) {
  titleDisp.textContent = document.getElementById('titleI').value.trim() || 'Title Here';
  document.title = titleDisp.textContent + ' — Live Counter';

  setVar('--title-font', titleFontI.value);
  setVar('--digit-font', digitFontI.value);
  setVar('--title-size', titleSizeI.value + 'px');
  setVar('--digit-scale', digitSizeI.value);
  setVar('--live-scale', liveSizeI.value);
  setVar('--title-color', titleColorI.value);
  setVar('--digit-color', digitColorI.value);
  setVar('--comma-color', digitColorI.value + '55');

  document.getElementById('titleSizeD').textContent = titleSizeI.value + 'px';
  document.getElementById('digitSizeD').textContent = digitSizeI.value + 'x';
  document.getElementById('liveSizeD').textContent = liveSizeI.value + 'x';

  document.body.classList.toggle('light-mode', modeToggle.checked);

  const bg = localStorage.getItem(STORAGE_KEY + '_bg');
  if (bg) {
    setVar('--bg-image', `url("${bg}")`);
    document.body.classList.add('has-bg');
  } else {
    setVar('--bg-image', 'none');
    document.body.classList.remove('has-bg');
  }

  if (save) saveSettings();

  const keepValue = Math.round(displayValue || cfg.start || 0);
  buildCols(cols.length || 1);
  renderStatic(keepValue);
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);

    if (s.title) document.getElementById('titleI').value = s.title;
    if (s.titleFont) titleFontI.value = s.titleFont;
    if (s.digitFont) digitFontI.value = s.digitFont;
    if (s.titleSize) titleSizeI.value = s.titleSize;
    if (s.digitSize) digitSizeI.value = s.digitSize;
    if (s.liveSize) liveSizeI.value = s.liveSize;
    if (s.titleColor) titleColorI.value = s.titleColor;
    if (s.digitColor) digitColorI.value = s.digitColor;
    modeToggle.checked = !!s.lightMode;

    applyVisualSettings(false);
  } catch (e) {}
}

function defaultSettings() {
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_KEY + '_bg');

  document.getElementById('titleI').value = 'Title Here';
  titleFontI.value = "'Oswald', sans-serif";
  digitFontI.value = "'Oswald', sans-serif";
  titleSizeI.value = 58;
  digitSizeI.value = 1;
  liveSizeI.value = 1;
  titleColorI.value = '#ffffff';
  digitColorI.value = '#ffffff';
  modeToggle.checked = false;

  applyVisualSettings(false);
  cfg = { start: 0, speed: 1000, min: 1, max: 5 };
  document.getElementById('startI').value = 0;
  document.getElementById('speedI').value = 1;
  document.getElementById('minI').value = 1;
  document.getElementById('maxI').value = 5;
  document.getElementById('startD').textContent = 0;
  document.getElementById('speedD').textContent = '1.0s';
  document.getElementById('minD').textContent = 1;
  document.getElementById('maxD').textContent = 5;
  init();
  saveSettings();
}


const digitFontI = document.getElementById('digitFontI');
const titleSizeI = document.getElementById('titleSizeI');
const digitSizeI = document.getElementById('digitSizeI');

function applyFontAndSizeSettings({ rebuildDigits = false } = {}) {
  document.body.style.setProperty('--title-font', titleFontI.value);
  document.body.style.setProperty('--digit-font', digitFontI.value);
  document.body.style.setProperty('--title-size', titleSizeI.value + 'px');
  document.body.style.setProperty('--digit-size-mult', digitSizeI.value);

  document.getElementById('titleSizeD').textContent = titleSizeI.value + 'px';
  document.getElementById('digitSizeD').textContent = digitSizeI.value + 'x';

  localStorage.setItem('liveCounterFonts', JSON.stringify({
    titleFont: titleFontI.value,
    digitFont: digitFontI.value,
    titleSize: titleSizeI.value,
    digitSize: digitSizeI.value
  }));

  if (rebuildDigits) {
    buildCols();
    applyDigits(true);
  }
}

function loadSavedFontSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('liveCounterFonts') || '{}');
    if (saved.titleFont) titleFontI.value = saved.titleFont;
    if (saved.digitFont) digitFontI.value = saved.digitFont;
    if (saved.titleSize) titleSizeI.value = saved.titleSize;
    if (saved.digitSize) digitSizeI.value = saved.digitSize;
  } catch (e) {}
  applyFontAndSizeSettings({ rebuildDigits: true });
}

titleFontI.addEventListener('change', () => applyFontAndSizeSettings());
digitFontI.addEventListener('change', () => applyFontAndSizeSettings({ rebuildDigits: true }));
titleSizeI.addEventListener('input', () => applyFontAndSizeSettings());
digitSizeI.addEventListener('input', () => applyFontAndSizeSettings({ rebuildDigits: true }));

const speedI = document.getElementById('speedI');
const minI   = document.getElementById('minI');
const maxI   = document.getElementById('maxI');
const startI = document.getElementById('startI');

speedI.addEventListener('input', () => {
  document.getElementById('speedD').textContent = parseFloat(speedI.value).toFixed(1) + 's';
});

minI.addEventListener('input', () => {
  document.getElementById('minD').textContent = minI.value;
  if (+maxI.value < +minI.value) {
    maxI.value = minI.value;
    document.getElementById('maxD').textContent = minI.value;
  }
});

maxI.addEventListener('input', () => {
  document.getElementById('maxD').textContent = maxI.value;
  if (+minI.value > +maxI.value) {
    minI.value = maxI.value;
    document.getElementById('minD').textContent = maxI.value;
  }
});

startI.addEventListener('input', () => {
  document.getElementById('startD').textContent = startI.value;
});

function readSettings() {
  const t = document.getElementById('titleI').value.trim() || 'Title Here';
  titleDisp.textContent = t;
  document.title = t + ' — Live Counter';
  liveBadge.classList.toggle('hidden', !liveToggle.checked);
  cfg.start = parseInt(startI.value) || 0;
  cfg.speed = Math.round(parseFloat(speedI.value) * 1000);
  cfg.min   = parseInt(minI.value);
  cfg.max   = Math.max(parseInt(maxI.value), cfg.min);

  applyVisualSettings(true);

  pOpen = false; panelEl.classList.remove('open'); gearBtn.classList.remove('open');
}

document.getElementById('applyBtn').addEventListener('click', () => {
  readSettings();
  if (ticker) clearInterval(ticker);
  startCounter();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  readSettings();
  initCounter();
});

window.addEventListener('resize', () => {
  buildCols();
  applyDigits(true);
});

/* Start live count automatically */
loadSavedFontSettings();
readSettings();
initCounter();
</script>
</body>
</html>
